name: Build Draft Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch all history for tag analysis
    
    - name: Calculate Next Version
      id: semver
      run: |
        # Get the latest tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        
        # Remove 'v' prefix if present
        VERSION=${LATEST_TAG#v}
        
        # Split version into components
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        
        # Check commit messages since last tag for conventional commits
        COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
        
        # Determine version bump based on commit messages
        if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE:|feat!:|fix!:)"; then
          # Breaking change = major bump
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
          # New feature = minor bump
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          # Everything else = patch bump
          PATCH=$((PATCH + 1))
        fi
        
        # Create pre-release tag
        NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}-draft.${GITHUB_SHA::7}"
        echo "New version: $NEW_VERSION"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
    
    - name: Get or Create Draft Release
      id: draft_release
      uses: actions/github-script@v7
      env:
        NEW_VERSION: ${{ steps.semver.outputs.version }}
      with:
        script: |
          const newVersion = process.env.NEW_VERSION;
          
          // Check for existing draft release
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          
          let draftRelease = releases.find(r => r.draft === true);
          let newVersionTag = newVersion.replace(/-[a-zA-Z-\d\.]*\.\d*/, '');
          
          if (draftRelease) {
            // Draft already exists, update it with new version tag
            console.log(`Updating existing draft release: ${draftRelease.id}`);
            console.log(`New version tag: ${newVersion}`);
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draftRelease.id,
              tag_name: newVersion,
              name: `Release ${newVersion}`,
              generate_release_notes: true,
            });
            
            console.log('Draft release updated with latest changes');
          } else {
            // Create new draft release
            console.log('Creating new draft release');
            console.log(`Version tag: ${newVersion}`);
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newVersionTag,
              name: `Release ${newVersionTag}`,
              draft: true,
              generate_release_notes: true,
            });
            
            console.log('Draft release created successfully');
          }
